name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test
      - run: node --check build/index.js

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
      - name: Regenerate the synthetic fixture with the current generator
        run: |
          npm ci
          npm run build
          node scripts/gen-synthetic-fixture.mjs
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Sync Python environment
        working-directory: python
        run: uv sync
      - name: Validate regenerated fixture against the official PLCopen XSD
        working-directory: python
        run: uv run pytest -q
